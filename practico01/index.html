<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practica Vue 2</title>

  <!-- CDN -->
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

  <div id="app">

    <h2>Paso 2</h2>
    <p>Nombre: {{ nombre }}</p>
    <p>Edad: {{ edad }}</p>
    <p>Ciudad: {{ ciudad }}</p>
    <p>Hola, mi nombre es {{ nombre }}, tengo {{ edad }} años y vivo en {{ ciudad }}</p>

    <h2>Paso 3</h2>
    <p>Contador: {{ contador }} </p>
    <button @click="contador++">Incrementar</button>
    <button @click="contador--">Decrementar</button>  

    <h2>Paso 4</h2>
    <p>Tareas</p>
    <input v-model="nuevaTarea">
    <button @click="agregarTarea">Agregar tarea</button>
    <ul>
      <li v-for="tarea in tareas" :key="tarea.id">
        <input type="checkbox" v-model="tarea.completada">
        {{ tarea.texto }}
      </li>
    </ul>
    <p>Total de tareas: {{ totalTareas }}</p>
    <p>Tareas pendientes: {{ tareasPendientes }}</p>

  </div>

  <script>
    new Vue({
      el: '#app',
      data: {
        nombre: 'Ana Garcia',
        edad: 30,
        ciudad: "Tupungato",
        contador: 0,
        nuevaTarea: "",
        tareas: [{ id: 1, texto: 'Aprender Vue',completada: false}]
      },
      methods: {
        agregarTarea: function(){
          this.tareas.push({
            id: Date.now(),
            texto: this.nuevaTarea,
            completada: false
          });
          this.nuevaTarea='';
        }
      },
      computed: {
        totalTareas: function(){
          return this.tareas.length;
        },
        tareasPendientes: function(){
          return this.tareas.filter(function(tarea){
            return !tarea.completada;
          }).length;
        }         
      }
    });
  </script>

</body>
</html>
